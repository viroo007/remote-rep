<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASON demo</title>
</head>
<body>
    <h2>creating object with function</h2>
    <p id="demo"></p>
    <script>
        const person={
            fname:"ajith",
            mname:"kumar",
            lname:"ujire",
            dob:"12-2-2005",
            gender:"Male",

            fullname:function(){
                return this.fname+" "+this.mname+" "+this.lname;

            }

        }
        document.getElementById("demo").innerHTML=person.fullname();
    </script>
    
</body>
</html>
