<html>
    <body>
        <h2>JSON constroctor</h2>
        <p id="demo"></p>
        <script>
            function person(first,last){
                this.fname=first;
                this.lname=last;}
                const myFather=new person("kumar","ujire");
                document.getElementById("demo").innerHTML=myFather.lname;
                document.getElementById("demo").innerHTML=myFather.fname;

            
            </script>
    </body>
</html>
